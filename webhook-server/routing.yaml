# Pipedrive event → bot routing table.
# This file is the source of truth for webhook routing.
# Editing this file + restarting the webhook server is all it takes
# to change routing behavior — no code changes needed.

routes:
  - event: added.lead
    to: lux
    reason: "SDR owns the inbox"

  - event: updated.lead
    to: lux
    skip_if_bot_creator: true

  # added.person removed -- fires alongside added.lead (~250ms apart)
  # with a different rollup key, causing parallel Lux sessions.

  - event: updated.person
    to: lux
    skip_if_bot_creator: true

  # added.organization removed -- same reason as added.person above.

  - event: updated.organization
    to: lux
    skip_if_bot_creator: true

  - event: added.deal
    to: taro
    skip_if_bot_creator: true

  - event: updated.deal
    to: taro
    cc: zeno
    skip_if_bot_creator: true
    only_on_change:
      - stage_id
      - status
      - value

  - event: deleted.deal
    to: zeno

  - event: deleted.lead
    to: zeno
